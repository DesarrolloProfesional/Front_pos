<div class="min-h-screen flex items-center justify-center bg-gray-100">

  <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-lg">

    <h2 class="text-2xl font-bold text-center mb-6">
      Iniciar sesión
    </h2>

    <!-- Error global -->
    @if (error) {
      <div class="bg-red-100 text-red-600 p-3 rounded mb-4 text-sm">
        {{ error }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="login()" class="space-y-4">

      <!-- Usuario -->
      <div>
        <label class="block text-sm mb-1">Usuario</label>

        <input
          type="text"
          formControlName="username"
          class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        @if (username?.touched && username?.invalid) {
          <p class="text-red-500 text-sm mt-1">
            El usuario es obligatorio
          </p>
        }
      </div>

      <!-- Contraseña -->
      <div>
        <label class="block text-sm mb-1">Contraseña</label>

        <input
          type="password"
          formControlName="password"
          class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        @if (password?.touched && password?.errors?.['required']) {
          <p class="text-red-500 text-sm mt-1">
            La contraseña es obligatoria
          </p>
        }

        @if (password?.touched && password?.errors?.['minlength']) {
          <p class="text-red-500 text-sm mt-1">
            Mínimo 4 caracteres
          </p>
        }
      </div>

      <!-- Botón -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 disabled:opacity-50"
      >
        @if (loading) {
          <span>Ingresando...</span>
        } @else {
          <span>Ingresar</span>
        }
      </button>

    </form>

  </div>
</div>
