<!-- Layout base -->
<div class="min-h-screen bg-slate-950 text-slate-100 p-6">
  <div class="mx-auto max-w-3xl">
    <header class="mb-6 flex items-center justify-between">
      <h1 class="text-xl font-semibold">Demo POS</h1>
      <div class="inline-flex items-center gap-2 rounded-full bg-emerald-500/15 px-3 py-1 ring-1 ring-emerald-500/40">
        <span class="size-2 rounded-full bg-emerald-400"></span>
        <span class="text-emerald-300 text-sm">Tailwind + PrimeNG</span>
      </div>
    </header>

    <!-- Card -->
    <div class="rounded-2xl bg-slate-900/60 ring-1 ring-white/10 shadow-lg">
      <div class="border-b border-white/10 px-5 py-4">
        <h2 class="text-lg font-medium">Registrar venta</h2>
      </div>

      <div class="p-5 grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm mb-1">Cliente</label>
          <input pInputText type="text" placeholder="Nombre o NIT"
                 class="w-full !bg-slate-800 !border-slate-700 !text-slate-100" />
        </div>

      <label class="block text-sm mb-1">Forma de pago</label>
      <p-select
        [options]="[{label:'Efectivo',value:'cash'},{label:'Tarjeta',value:'card'}]"
        optionLabel="label"
        optionValue="value"
        placeholder="Selecciona"
        [(ngModel)]="pago"
      ></p-select>


        <div class="md:col-span-2">
          <label class="block text-sm mb-1">Observaciones</label>
          <textarea pInputTextarea rows="3" class="w-full !bg-slate-800 !border-slate-700"></textarea>
        </div>
      </div>

      <div class="px-5 py-4 flex items-center justify-end gap-3">
        <p-button
          label="Cancelar"
          styleClass="!bg-transparent !text-slate-300 hover:!bg-slate-800 !rounded-xl"
        ></p-button>
        <p-button
          label="Guardar"
          icon="pi pi-save"
          styleClass="!rounded-xl !px-6 !bg-emerald-600 hover:!bg-emerald-700"
        ></p-button>
      </div>
    </div>
  </div>
</div>
