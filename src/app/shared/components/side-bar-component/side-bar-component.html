<aside class="w-64 bg-white shadow-lg flex flex-col h-full">

  <!-- Logo -->
  <div class="p-4 font-bold text-lg border-b">
    POS System
  </div>

  <!-- Menu -->
  <nav class="flex-1 p-4 space-y-2">

    @for (item of menu; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-gray-200"
        class="flex items-center gap-2 p-2 rounded hover:bg-gray-100 transition"
      >
        @if (item.icon) {
          <span>{{ item.icon }}</span>
        }
        <span>{{ item.label }}</span>
      </a>
    }

  </nav>

  <!-- Logout -->
  <div class="p-4 border-t">
    <button
      (click)="onLogout()"
      class="w-full bg-red-500 text-white p-2 rounded hover:bg-red-600"
    >
      Cerrar sesión
    </button>
  </div>

</aside>
